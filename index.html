<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant - Online Menu</title>
    <!-- Tailwind CSS 4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap");

      .font-playfair {
        font-family: "Playfair Display", serif;
      }

      .menu-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      .category-btn.active {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-amber-50 via-orange-50 to-red-50 min-h-screen"
  >
    <!-- Navigation Bar -->
    <nav class="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-2">
            <span class="text-3xl">🍽️</span>
            <h1 class="text-2xl font-bold font-playfair text-gray-800">
              Restaurant
            </h1>
          </div>
          <div class="hidden md:flex space-x-6 text-gray-600">
            <a href="#" class="hover:text-red-500 transition">Bosh sahifa</a>
            <a href="#" class="hover:text-red-500 transition">Menu</a>
            <a href="#" class="hover:text-red-500 transition">Biz haqimizda</a>
            <a href="#" class="hover:text-red-500 transition">Aloqa</a>
          </div>
          <button
            class="bg-red-500 text-white px-6 py-2 rounded-full hover:bg-red-600 transition shadow-lg"
          >
            Buyurtma berish
          </button>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <div class="max-w-7xl mx-auto px-4 pt-16 pb-12 text-center">
      <h1
        class="text-5xl md:text-7xl font-bold font-playfair text-gray-800 mb-4"
      >
        Bizning Menu
      </h1>
      <p class="text-xl text-gray-600 mb-8">
        Eng zo'r taomlar, ajoyib atmosfera
      </p>
      <div class="w-24 h-1 bg-red-500 mx-auto"></div>
    </div>

    <!-- Category Filter Buttons -->
    <div class="max-w-7xl mx-auto px-4 mb-12">
      <div class="flex flex-wrap justify-center gap-4">
        <button
          onclick="filterCategory('all', this)"
          class="category-btn active px-8 py-3 rounded-full bg-red-500 text-white font-semibold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
        >
          Barchasi
        </button>
        <button
          onclick="filterCategory('milliy', this)"
          class="category-btn px-8 py-3 rounded-full bg-white text-gray-700 font-semibold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
        >
          🥘 Milliy taomlar
        </button>
        <button
          onclick="filterCategory('fastfood', this)"
          class="category-btn px-8 py-3 rounded-full bg-white text-gray-700 font-semibold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
        >
          🍔 Fast Food
        </button>
        <button
          onclick="filterCategory('ichimliklar', this)"
          class="category-btn px-8 py-3 rounded-full bg-white text-gray-700 font-semibold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
        >
          🥤 Ichimliklar
        </button>
        <button
          onclick="filterCategory('shirinliklar', this)"
          class="category-btn px-8 py-3 rounded-full bg-white text-gray-700 font-semibold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
        >
          🍰 Shirinliklar
        </button>
      </div>
    </div>

    <!-- Menu Grid -->
    <div class="max-w-7xl mx-auto px-4 pb-20">
      <div
        id="menuGrid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <!-- Menu items will be generated by JavaScript -->
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12">
      <div class="max-w-7xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <h3 class="text-2xl font-bold font-playfair mb-4">Restaurant</h3>
            <p class="text-gray-400">
              Eng zo'r taomlar, ajoyib xizmat ko'rsatish
            </p>
          </div>
          <div>
            <h4 class="font-semibold mb-4">Ish vaqti</h4>
            <p class="text-gray-400">Dushanba - Yakshanba</p>
            <p class="text-gray-400">10:00 - 23:00</p>
          </div>
          <div>
            <h4 class="font-semibold mb-4">Aloqa</h4>
            <p class="text-gray-400">📞 +998 90 123 45 67</p>
            <p class="text-gray-400">📍 Toshkent sh., Amir Temur ko'chasi</p>
          </div>
        </div>
      </div>
    </footer>

    <script>

        {

            "https://images.unsplash.com/photo-1501443762994-82bd5dace89a?w=400&h=300&fit=crop",
          category: "shirinliklar",
          rating: 4.5,
          popular: false,
        },
      ];

      // Menuni ko'rsatish funksiyasi
      function displayMenu(items) {
        const menuGrid = document.getElementById("menuGrid");
        menuGrid.innerHTML = "";

        items.forEach((item) => {
          const card = document.createElement("div");
          card.className =
            "menu-card bg-white rounded-2xl shadow-lg overflow-hidden transition duration-300 hover:shadow-2xl";
          card.innerHTML = `
                    <div class="relative overflow-hidden">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-56 object-cover transition duration-300 hover:scale-110">
                        ${item.popular ? '<span class="absolute top-4 right-4 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-semibold">🔥 Mashhur</span>' : ""}
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-semibold text-yellow-600">
                            ⭐ ${item.rating}
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 font-playfair">${item.name}</h3>
                            <span class="text-2xl font-bold text-red-500">${item.price.toLocaleString()} so'm</span>
                        </div>
                        <p class="text-gray-600 mb-4">${item.description}</p>
                        <button class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-3 rounded-xl font-semibold hover:from-red-600 hover:to-red-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                            🛒 Savatga qo'shish
                        </button>
                    </div>
                `;
          menuGrid.appendChild(card);
        });
      }

      // Kategoriya filtrlash funksiyasi
      function filterCategory(category, buttonElement) {
        // Barcha category buttonlardan active klassini olib tashlash
        const buttons = document.querySelectorAll(".category-btn");
        buttons.forEach((btn) =>
          btn.classList.remove("active", "bg-red-500", "text-white"),
        );

        // Bosilgan buttonga active klassini qo'shish
        buttonElement.classList.add("active", "bg-red-500", "text-white");

        // Filtrlash
        let filteredItems;
        if (category === "all") {
          filteredItems = menuItems;
        } else {
          filteredItems = menuItems.filter(
            (item) => item.category === category,
          );
        }

        displayMenu(filteredItems);
      }

      // Sahifa yuklanganda barcha taomlarni ko'rsatish
      window.onload = function () {
        displayMenu(menuItems);
      };
    </script>
  </body>
</html>
